# Google Cloud Build - CI/CD Configuration
# Triggered automatically on git push to main branch

steps:
  # Build Enrichment Service
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-enrichment'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/enrichment-service:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/enrichment-service:latest'
      - './services/enrichment'
  
  # Push Enrichment Service
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-enrichment'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/enrichment-service:$SHORT_SHA'
  
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/enrichment-service:latest'
  
  # Deploy Enrichment Service to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-enrichment'
    args:
      - 'run'
      - 'deploy'
      - 'enrichment-service'
      - '--image=gcr.io/$PROJECT_ID/enrichment-service:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest,PERPLEXITY_API_KEY=perplexity-api-key:latest'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300'
      - '--max-instances=10'

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/enrichment-service:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/enrichment-service:latest'

# Build timeout
timeout: 1200s

# Substitutions
substitutions:
  _SERVICE_NAME: enrichment-service
  _REGION: us-central1
